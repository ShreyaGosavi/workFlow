services:
  redis:
    image: redis:7
    container_name: workflow-queue
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  api:
    build: .
    container_name: workflow-api
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - .env
    command: node dist/main.js
    restart: unless-stopped

  worker:
    build: .
    container_name: workflow-worker
    depends_on:
      - redis
    env_file:
      - .env
    command: node dist/worker.js
    restart: unless-stopped

volumes:
  redis-data: